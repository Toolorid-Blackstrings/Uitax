<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>503 - Service Unavailable | UITAX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f5f5f5;
      --bg-card: #ffffff;
      --bg-dark: #09090b;
      --bg-card-dark: #18181b;
      --text: #18181b;
      --text-dark: #f5f5f5;
      --border: #e4e4e7;
      --border-dark: #27272a;
      --text-muted: #71717a;
      --text-muted-dark: #a1a1aa;
      --accent: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    .container {
      max-width: 448px;
      width: 100%;
      padding: 20px;
    }

    .error-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      transition: 0.4s;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
    }

    body.dark .error-card {
      background: var(--bg-card-dark);
      border-color: var(--border-dark);
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      line-height: 1;
      color: white;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 600;
    }

    .powered-by {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    body.dark .powered-by {
      color: var(--text-muted-dark);
    }

    .b-logo {
      width: 14px;
      height: 14px;
      object-fit: contain;
      border-radius: 3px;
    }

    .error-code {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    body.dark .error-desc {
      color: var(--text-muted-dark);
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-bottom-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: block;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:active {
      transform: scale(0.98);
      background: #2563eb;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
      border: 1px solid #d4d4d8;
    }

    body.dark .btn-secondary {
      background: #27272a;
      border-color: #3f3f46;
      color: var(--text-dark);
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .footer-info {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    body.dark .footer-info {
      border-color: var(--border-dark);
      color: var(--text-muted-dark);
    }

    .company-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-weight: 500;
    }

    .company-badge img {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-card">
      <div class="logo-wrap">
       

      <div class="error-code">503</div>
      <h1 class="error-title">Service Unavailable</h1>
      <p class="error-desc">
        We're currently performing maintenance or experiencing high traffic. 
        UITAX will be back online shortly.
      </p>



        <a href="index.html" class="btn btn-secondary">Go to Homepage</a>
      </div>

      <div class="footer-info">
        <div>Black Strings Infrastructure</div>
        <div class="company-badge">
          <img src="N.PNG" alt="B">
          <span>Maintained by Telcallto system</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme sync with main page
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }

    // Auto retry every 30s
    setTimeout(() => {
      location.reload();
    }, 30000);
  </script>
</body>
</html>
